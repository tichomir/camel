name: SDK CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Lint camel_security/
        run: ruff check camel_security/

  # ── Stage 2: Type-check ────────────────────────────────────────────────────
  type-check:
    name: Type-check (mypy --strict)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + mypy
        run: |
          pip install -e ".[dev]"

      - name: mypy --strict on camel_security/
        run: mypy --strict camel_security/

  # ── Stage 3: Build ─────────────────────────────────────────────────────────
  build:
    name: Build (sdist + wheel, no native binaries)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build toolchain
        run: pip install "build>=1.0" "twine>=5.0"

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify no native binary artifacts in wheel
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Inspecting wheel: $WHEEL"
          if unzip -l "$WHEEL" | grep -E '\.(so|pyd|dylib)$'; then
            echo "ERROR: Native binary artifact found in wheel. Aborting."
            exit 1
          fi
          echo "OK: No native binary artifacts found."

      - name: Check distribution metadata (twine)
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Stage 4: Publish to Test PyPI ─────────────────────────────────────────
  publish-test-pypi:
    name: Publish to Test PyPI
    runs-on: ubuntu-latest
    needs: build
    # Only run on version tags (e.g. v0.5.0)
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/camel-security
    # Authentication method: OIDC Trusted Publishing (https://docs.pypi.org/trusted-publishers/)
    # This is the sole auth method — do NOT add TWINE_USERNAME/TWINE_PASSWORD secrets here,
    # as the two methods are mutually exclusive on Test PyPI. To use this workflow, configure
    # a Trusted Publisher in the Test PyPI project settings for this GitHub repository and
    # workflow file (publisher type: GitHub Actions, environment: test-pypi).
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI (OIDC Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Stage 5: Verify install from Test PyPI ────────────────────────────────
  verify-install:
    name: Verify pip install from Test PyPI
    runs-on: ubuntu-latest
    needs: publish-test-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for Test PyPI index to propagate
        run: sleep 30

      - name: Install camel-security from Test PyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "camel-security==${{ steps.version.outputs.version }}"

      - name: Verify clean import
        run: python -c "from camel_security import CaMeLAgent; print('Import OK:', CaMeLAgent)"
