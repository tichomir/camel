name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & Benchmark
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Lint (ruff)
        run: ruff check camel/ tests/

      - name: Type-check (mypy)
        run: mypy camel/
        continue-on-error: true  # mypy is advisory in CI for now; promote to hard-fail in Milestone 2

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short \
            --cov=camel \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Performance baseline — interpreter overhead (NFR-4)
        run: python scripts/benchmark_interpreter.py --verbose
